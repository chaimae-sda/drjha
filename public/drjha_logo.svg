<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Monitor frame left bracket - vertical bar -->
  <rect x="18" y="68" width="10" height="80" rx="3" fill="#7B5CF5"/>
  <!-- Monitor frame left bracket - horizontal top -->
  <rect x="18" y="68" width="28" height="10" rx="3" fill="#7B5CF5"/>
  <!-- Monitor frame left bracket - horizontal bottom -->
  <rect x="18" y="138" width="28" height="10" rx="3" fill="#7B5CF5"/>

  <!-- Monitor frame right bracket - vertical bar -->
  <rect x="172" y="68" width="10" height="80" rx="3" fill="#7B5CF5"/>
  <!-- Monitor frame right bracket - horizontal top -->
  <rect x="154" y="68" width="28" height="10" rx="3" fill="#7B5CF5"/>
  <!-- Monitor frame right bracket - horizontal bottom -->
  <rect x="154" y="138" width="28" height="10" rx="3" fill="#7B5CF5"/>

  <!-- Monitor stand base -->
  <rect x="82" y="155" width="36" height="10" rx="5" fill="#7B5CF5"/>
  <!-- Monitor stand neck -->
  <rect x="96" y="148" width="8" height="12" rx="3" fill="#7B5CF5"/>

  <!-- Open book left page (spread upward) -->
  <path d="M46 148 C46 148 48 110 70 88 C80 79 95 75 100 75 L100 148 Z" fill="#7B5CF5"/>
  <!-- Left page inner curve -->
  <path d="M52 148 C52 148 54 112 74 92 C83 83 96 79 100 79 L100 148 Z" fill="#9B7FF8" opacity="0.4"/>

  <!-- Open book right page -->
  <path d="M154 148 C154 148 152 110 130 88 C120 79 105 75 100 75 L100 148 Z" fill="#7B5CF5"/>
  <!-- Right page inner curve -->
  <path d="M148 148 C148 148 146 112 126 92 C117 83 104 79 100 79 L100 148 Z" fill="#9B7FF8" opacity="0.4"/>

  <!-- Book spine / base line -->
  <ellipse cx="100" cy="148" rx="54" ry="4" fill="#6347D9"/>

  <!-- Book top arch -->
  <path d="M72 82 C80 62 100 55 100 55 C100 55 120 62 128 82" stroke="#7B5CF5" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Person head silhouette (side profile, facing right) -->
  <circle cx="95" cy="103" r="13" fill="none" stroke="#7B5CF5" stroke-width="3"/>
  <!-- Nose bump -->
  <path d="M106 105 L111 110 L108 113" fill="none" stroke="#7B5CF5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Chin/jaw line -->
  <path d="M103 114 C107 116 111 113 112 110" fill="none" stroke="#7B5CF5" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Neck -->
  <path d="M90 114 C90 118 93 122 96 123 C99 122 102 118 102 114" fill="none" stroke="#7B5CF5" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Sound waves from mouth -->
  <path d="M113 111 C117 108 117 115 113 113" fill="none" stroke="#7B5CF5" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M115 108 C121 104 122 118 115 116" fill="none" stroke="#7B5CF5" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M117 105 C125 100 127 121 117 119" fill="none" stroke="#7B5CF5" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Pixel squares top right -->
  <rect x="148" y="30" width="15" height="15" rx="2" fill="#7B5CF5"/>
  <rect x="148" y="49" width="15" height="15" rx="2" fill="#7B5CF5"/>
  <rect x="167" y="40" width="11" height="11" rx="2" fill="#7B5CF5"/>
  <rect x="167" y="25" width="8" height="8" rx="2" fill="#7B5CF5"/>
</svg>
